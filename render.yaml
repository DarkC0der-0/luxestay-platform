services:
  # 1. Backend Web Service
  - type: web
    name: luxestay-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node app.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: luxestay-db
          property: connectionString

  # 2. Frontend Static Site
  - type: static
    name: luxestay-frontend
    buildCommand: VITE_API_URL=$$BACKEND_URL/api/v1 npm run build
    staticPublishPath: dist
    routes:
      # Rewrite rule to handle React Router client-side routing
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: BACKEND_URL
        fromService:
          name: luxestay-backend
          type: web
          property: host

databases:
  # 3. Managed PostgreSQL Database
  - name: luxestay-db
    plan: free
    postgresMajorVersion: 15
